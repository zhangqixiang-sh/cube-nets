<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正方体11种展开图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .category {
            margin-bottom: 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .category-title {
            font-size: 20px;
            color: #2196F3;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        .nets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }
        .net-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .net-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .net-canvas {
            display: grid;
            gap: 2px;
            padding: 10px;
            background: #fafafa;
            border-radius: 8px;
        }
        .cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
            border-radius: 4px;
            border: 2px solid rgba(0,0,0,0.1);
        }
        .cell-1 { background: #FF6B6B; }
        .cell-2 { background: #4ECDC4; }
        .cell-3 { background: #45B7D1; }
        .cell-4 { background: #FFA07A; }
        .cell-5 { background: #98D8C8; }
        .cell-6 { background: #F7DC6F; color: #333; }
        .empty { background: transparent; border: none; }
    </style>
</head>
<body>
    <h1>正方体11种展开图</h1>

    <!-- 1-4-1 型 -->
    <div class="category">
        <div class="category-title">一、1-4-1 型（6种）- 中间4个，上下各1个</div>
        <div class="nets-grid">
            
            <!-- 第1种 -->
            <div class="net-item">
                <div class="net-label">第1种</div>
                <div class="net-canvas" style="grid-template-columns: repeat(4, 40px); grid-template-rows: repeat(3, 40px);">
                    <div class="empty"></div><div class="cell cell-5">5</div><div class="empty"></div><div class="empty"></div>
                    <div class="cell cell-2">2</div><div class="cell cell-1">1</div><div class="cell cell-3">3</div><div class="cell cell-4">4</div>
                    <div class="empty"></div><div class="cell cell-6">6</div><div class="empty"></div><div class="empty"></div>
                </div>
            </div>

            <!-- 第2种 -->
            <div class="net-item">
                <div class="net-label">第2种</div>
                <div class="net-canvas" style="grid-template-columns: repeat(4, 40px); grid-template-rows: repeat(3, 40px);">
                    <div class="cell cell-5">5</div><div class="empty"></div><div class="empty"></div><div class="empty"></div>
                    <div class="cell cell-2">2</div><div class="cell cell-1">1</div><div class="cell cell-3">3</div><div class="cell cell-4">4</div>
                    <div class="empty"></div><div class="cell cell-6">6</div><div class="empty"></div><div class="empty"></div>
                </div>
            </div>

            <!-- 第3种 -->
            <div class="net-item">
                <div class="net-label">第3种</div>
                <div class="net-canvas" style="grid-template-columns: repeat(4, 40px); grid-template-rows: repeat(3, 40px);">
                    <div class="cell cell-5">5</div><div class="empty"></div><div class="empty"></div><div class="empty"></div>
                    <div class="cell cell-2">2</div><div class="cell cell-1">1</div><div class="cell cell-3">3</div><div class="cell cell-4">4</div>
                    <div class="empty"></div><div class="empty"></div><div class="empty"></div><div class="cell cell-6">6</div>
                </div>
            </div>

            <!-- 第4种 -->
            <div class="net-item">
                <div class="net-label">第4种</div>
                <div class="net-canvas" style="grid-template-columns: repeat(4, 40px); grid-template-rows: repeat(3, 40px);">
                    <div class="empty"></div><div class="empty"></div><div class="empty"></div><div class="cell cell-5">5</div>
                    <div class="cell cell-2">2</div><div class="cell cell-1">1</div><div class="cell cell-3">3</div><div class="cell cell-4">4</div>
                    <div class="empty"></div><div class="cell cell-6">6</div><div class="empty"></div><div class="empty"></div>
                </div>
            </div>

            <!-- 第5种 -->
            <div class="net-item">
                <div class="net-label">第5种</div>
                <div class="net-canvas" style="grid-template-columns: repeat(4, 40px); grid-template-rows: repeat(3, 40px);">
                    <div class="empty"></div><div class="cell cell-5">5</div><div class="empty"></div><div class="empty"></div>
                    <div class="cell cell-2">2</div><div class="cell cell-1">1</div><div class="cell cell-3">3</div><div class="cell cell-4">4</div>
                    <div class="empty"></div><div class="empty"></div><div class="empty"></div><div class="cell cell-6">6</div>
                </div>
            </div>

            <!-- 第6种 -->
            <div class="net-item">
                <div class="net-label">第6种</div>
                <div class="net-canvas" style="grid-template-columns: repeat(4, 40px); grid-template-rows: repeat(3, 40px);">
                    <div class="empty"></div><div class="empty"></div><div class="empty"></div><div class="cell cell-5">5</div>
                    <div class="cell cell-2">2</div><div class="cell cell-1">1</div><div class="cell cell-3">3</div><div class="cell cell-4">4</div>
                    <div class="empty"></div><div class="empty"></div><div class="empty"></div><div class="cell cell-6">6</div>
                </div>
            </div>

        </div>
    </div>

    <!-- 1-3-2 型 -->
    <div class="category">
        <div class="category-title">二、1-3-2 型（3种）- 中间3个，上1下2</div>
        <div class="nets-grid">
            
            <!-- 第7种: 上1个在左，下2个向右错位 -->
            <div class="net-item">
                <div class="net-label">第7种</div>
                <div class="net-canvas" style="grid-template-columns: repeat(4, 40px); grid-template-rows: repeat(3, 40px);">
                    <div class="cell cell-5">5</div><div class="empty"></div><div class="empty"></div><div class="empty"></div>
                    <div class="cell cell-2">2</div><div class="cell cell-1">1</div><div class="cell cell-3">3</div><div class="empty"></div>
                    <div class="empty"></div><div class="empty"></div><div class="cell cell-4">4</div><div class="cell cell-6">6</div>
                </div>
            </div>

            <!-- 第8种: 上1个在中，下2个居中向右错位 -->
            <div class="net-item">
                <div class="net-label">第8种</div>
                <div class="net-canvas" style="grid-template-columns: repeat(4, 40px); grid-template-rows: repeat(3, 40px);">
                    <div class="empty"></div><div class="cell cell-5">5</div><div class="empty"></div><div class="empty"></div>
                    <div class="cell cell-2">2</div><div class="cell cell-1">1</div><div class="cell cell-3">3</div><div class="empty"></div>
                    <div class="empty"></div><div class="empty"></div><div class="cell cell-4">4</div><div class="cell cell-6">6</div>
                </div>
            </div>

            <!-- 第9种: 上1个在右，下2个在右错位 -->
            <div class="net-item">
                <div class="net-label">第9种</div>
                <div class="net-canvas" style="grid-template-columns: repeat(4, 40px); grid-template-rows: repeat(3, 40px);">
                    <div class="empty"></div><div class="empty"></div><div class="cell cell-5">5</div><div class="empty"></div>
                    <div class="cell cell-2">2</div><div class="cell cell-1">1</div><div class="cell cell-3">3</div><div class="empty"></div>
                    <div class="empty"></div><div class="empty"></div><div class="cell cell-4">4</div><div class="cell cell-6">6</div>
                </div>
            </div>

        </div>
    </div>

    <!-- 2-2-2 型 -->
    <div class="category">
        <div class="category-title">三、2-2-2 型（1种）- 阶梯状</div>
        <div class="nets-grid">
            
            <!-- 第10种 -->
            <div class="net-item">
                <div class="net-label">第10种</div>
                <div class="net-canvas" style="grid-template-columns: repeat(4, 40px); grid-template-rows: repeat(3, 40px);">
                    <div class="empty"></div><div class="empty"></div><div class="cell cell-5">5</div><div class="cell cell-6">6</div>
                    <div class="empty"></div><div class="cell cell-3">3</div><div class="cell cell-4">4</div><div class="empty"></div>
                    <div class="cell cell-1">1</div><div class="cell cell-2">2</div><div class="empty"></div><div class="empty"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- 3-3 型 -->
    <div class="category">
        <div class="category-title">四、3-3 型（1种）- 两行各3个，错开</div>
        <div class="nets-grid">
            
            <!-- 第11种 -->
            <div class="net-item">
                <div class="net-label">第11种</div>
                <div class="net-canvas" style="grid-template-columns: repeat(5, 40px); grid-template-rows: repeat(2, 40px);">
                    <div class="cell cell-4">4</div><div class="cell cell-5">5</div><div class="cell cell-6">6</div><div class="empty"></div><div class="empty"></div>
                    <div class="empty"></div><div class="empty"></div><div class="cell cell-1">1</div><div class="cell cell-2">2</div><div class="cell cell-3">3</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
